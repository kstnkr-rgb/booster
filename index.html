<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Бустерпак</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: linear-gradient(160deg, #1a0a2e 0%, #0d0b1a 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
    }

    .scene {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .hint {
      color: #7c6faa;
      font-size: 0.78rem;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      text-align: center;
      margin-bottom: 20px;
      min-height: 1.2em;
      transition: opacity 0.4s;
    }

    /*
      pack-area has z-index: 2 — this makes it render ABOVE the prize-card
      (which has z-index: 1) while the card is inside the pack bounds.
      As the card slides below the pack, it exits the pack's visual coverage.
    */
    .pack-area {
      position: relative;
      z-index: 2;
      width: 220px;
      filter: drop-shadow(0 20px 40px rgba(100, 60, 200, 0.45));
    }

    .pack-top-wrap {
      position: relative;
      width: 220px;
      transform-origin: 50% 0;
      will-change: transform, opacity;
    }

    .pack-top-wrap img,
    .pack-body-img {
      width: 220px;
      height: auto;
      display: block;
    }

    /* Tear zone sits at the very bottom of the top piece */
    .tear-zone {
      position: absolute;
      bottom: 0;
      left: 0; right: 0;
      height: 24px;
      cursor: crosshair;
      touch-action: none;
      -webkit-touch-callout: none;
      display: flex;
      align-items: center;
    }

    .dashes {
      position: absolute;
      left: 6px; right: 6px;
      top: 50%; height: 0;
      transform: translateY(-50%);
      border-top: 2px dashed rgba(255, 255, 255, 0.55);
      pointer-events: none;
      filter: drop-shadow(0 0 3px rgba(255,255,255,0.6));
    }

    .cut-line {
      position: absolute;
      left: 0; top: 50%;
      height: 2px; width: 0%;
      transform: translateY(-50%);
      background: rgba(255,255,255,0.95);
      box-shadow: 0 0 10px rgba(255,255,255,0.8);
      pointer-events: none;
    }

    .scissors-icon {
      position: absolute;
      left: -4px; top: 50%;
      transform: translateY(-50%);
      font-size: 15px;
      z-index: 3;
      pointer-events: none;
      filter: drop-shadow(0 0 5px rgba(255,255,255,1));
    }

    /* Fly-away animation for pack top */
    @keyframes flyAway {
      0%   { transform: translateY(0) rotate(0deg); opacity: 1; }
      100% { transform: translateY(-400px) rotate(-22deg); opacity: 0; }
    }
    .pack-top-wrap.fly {
      animation: flyAway 0.6s cubic-bezier(0.22, 1, 0.36, 1) forwards;
      pointer-events: none;
    }

    /* Dark backdrop */
    .backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.75);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.45s ease;
      z-index: 88;
    }
    .backdrop.show { opacity: 1; }

    /*
      Prize card — fixed position, z-index: 1 so pack-area (z:2) covers it
      while it's still within the pack's bounds. Once it slides below
      the pack bottom, it becomes visible naturally.
    */
    .prize-card {
      position: fixed;
      background: #ffffff;
      border-radius: 16px;
      box-shadow:
        0 16px 56px rgba(0, 0, 0, 0.55),
        0 0 0 2px rgba(255, 215, 0, 0.45);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 26px 20px;
      opacity: 0;
      pointer-events: none;
      z-index: 1;
    }

    .prize-star      { font-size: 30px; color: #f59e0b; line-height: 1; }
    .prize-gold-line { width: 36px; height: 2px; background: linear-gradient(90deg, #f59e0b, #fbbf24, #f59e0b); border-radius: 1px; }
    .prize-label-txt { font-size: 9px; font-weight: 700; letter-spacing: 2.5px; text-transform: uppercase; color: #9ca3af; }
    .prize-value     { font-size: 24px; font-weight: 800; color: #111827; text-align: center; line-height: 1.25; }

    /* Repeat button */
    .btn {
      position: fixed;
      bottom: 36px;
      left: 50%;
      transform: translateX(-50%) translateY(16px);
      padding: 12px 40px;
      background: linear-gradient(145deg, #7c3aed, #6d28d9);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 0.9rem;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      cursor: pointer;
      box-shadow: 0 4px 18px rgba(109, 40, 217, 0.55);
      transition: all 0.25s;
      opacity: 0;
      pointer-events: none;
      z-index: 110;
    }
    .btn.visible {
      opacity: 1;
      pointer-events: auto;
      transform: translateX(-50%) translateY(0);
    }
    .btn:hover  { box-shadow: 0 6px 26px rgba(124, 58, 237, 0.65); }
    .btn:active { transform: translateX(-50%) translateY(1px); }
  </style>
</head>
<body>

<div class="backdrop" id="backdrop"></div>

<div class="scene">
  <p class="hint" id="hint">Проведи пальцем по линии отрыва →</p>

  <div class="pack-area" id="packArea">
    <div class="pack-top-wrap" id="packTopWrap">
      <img id="packTopImg" src="booster_gold_top.png" alt="">
      <div class="tear-zone" id="tearZone">
        <div class="dashes"></div>
        <div class="cut-line" id="cutLine"></div>
        <div class="scissors-icon" id="scissors">✂️</div>
      </div>
    </div>
    <img class="pack-body-img" id="packBodyImg" src="booster_gold_body.png" alt="">
  </div>
</div>

<!-- Prize card lives outside pack-area so z-index comparison works -->
<div class="prize-card" id="prizeCard">
  <div class="prize-star">★</div>
  <div class="prize-gold-line"></div>
  <div class="prize-label-txt">Ваш приз</div>
  <div class="prize-value" id="prizeValue">—</div>
</div>

<button class="btn" id="repeatBtn">Повторить</button>

<script>
  const PRIZES = [
    'Кофе', '-10%', '-15%', '-20%', 'Фишка с котом',
    'Скидка на сладкое', 'Кошачий корм', 'Предсказание',
    '50 бонусов', 'Билет', 'Дополнительный ход'
  ];

  const PACKS = [
    { top: 'booster_gold_top.png', body: 'booster_gold_body.png' },
    { top: 'booster_foil_top.png', body: 'booster_foil_body.png' },
  ];

  const packTopWrap = document.getElementById('packTopWrap');
  const packTopImg  = document.getElementById('packTopImg');
  const packBodyImg = document.getElementById('packBodyImg');
  const tearZone    = document.getElementById('tearZone');
  const cutLine     = document.getElementById('cutLine');
  const scissors    = document.getElementById('scissors');
  const prizeCard   = document.getElementById('prizeCard');
  const prizeValue  = document.getElementById('prizeValue');
  const repeatBtn   = document.getElementById('repeatBtn');
  const hint        = document.getElementById('hint');
  const backdrop    = document.getElementById('backdrop');

  let cutProgress = 0;
  let dragging    = false;
  let opened      = false;

  function getClientX(e) { return e.touches ? e.touches[0].clientX : e.clientX; }

  function onStart(e) {
    if (opened) return;
    e.preventDefault();
    dragging = true;
    advance(getClientX(e));
  }

  function onMove(e) {
    if (!dragging || opened) return;
    e.preventDefault();
    advance(getClientX(e));
  }

  function onEnd() { dragging = false; }

  function advance(clientX) {
    const rect = tearZone.getBoundingClientRect();
    const p = Math.min(1, Math.max(0, (clientX - rect.left) / rect.width));
    if (p <= cutProgress) return;
    cutProgress = p;

    cutLine.style.width = (cutProgress * 100) + '%';
    scissors.style.left = Math.max(-4, cutProgress * rect.width - 10) + 'px';
    packTopWrap.style.transform = `translateY(${-cutProgress * 5}px)`;

    if (cutProgress >= 0.8) open();
  }

  function open() {
    opened = true;
    dragging = false;
    hint.style.opacity = '0';
    cutLine.style.width = '100%';
    packTopWrap.style.transform = '';

    prizeValue.textContent = PRIZES[Math.floor(Math.random() * PRIZES.length)];

    setTimeout(() => {
      packTopWrap.classList.add('fly');

      setTimeout(() => {
        const bodyRect = packBodyImg.getBoundingClientRect();

        // Card is 90% the width of the pack body, centered on it
        const cardW = Math.round(bodyRect.width * 0.9);
        const cardL = bodyRect.left + bodyRect.width * 0.05;

        // Measure card height by briefly making it measurable
        prizeCard.style.cssText = `
          position: fixed;
          width: ${cardW}px;
          left: ${cardL}px;
          top: -9999px;
          opacity: 0;
          z-index: 1;
        `;
        void prizeCard.offsetHeight;
        const cardH = prizeCard.offsetHeight;

        // Position card so its bottom aligns with pack body bottom
        // It's hidden behind pack-area (z:2 vs z:1)
        const startTop = bodyRect.bottom - cardH;

        Object.assign(prizeCard.style, {
          top:       startTop + 'px',
          opacity:   '1',
          transition: 'none',
        });

        void prizeCard.offsetWidth;

        // Phase 1: slide card down and out from under pack bottom
        const exitTop = bodyRect.bottom + 8;
        Object.assign(prizeCard.style, {
          transition: 'top 0.7s cubic-bezier(0.22, 1, 0.36, 1)',
          top:        exitTop + 'px',
        });

        // Phase 2: fly to screen center
        setTimeout(() => {
          backdrop.classList.add('show');

          Object.assign(prizeCard.style, {
            transition: [
              'top    0.6s cubic-bezier(0.22, 1, 0.36, 1)',
              'left   0.6s cubic-bezier(0.22, 1, 0.36, 1)',
              'width  0.5s cubic-bezier(0.22, 1, 0.36, 1)',
              'transform 0.55s cubic-bezier(0.34, 1.56, 0.64, 1)',
            ].join(', '),
            top:       '50%',
            left:      '50%',
            width:     '280px',
            transform: 'translate(-50%, -50%)',
            zIndex:    '100',
          });

          setTimeout(() => repeatBtn.classList.add('visible'), 700);
        }, 800);
      }, 360);
    }, 80);
  }

  function pickPack() {
    const pack = PACKS[Math.floor(Math.random() * PACKS.length)];
    packTopImg.src  = pack.top;
    packBodyImg.src = pack.body;
  }

  function reset() {
    opened = false;
    cutProgress = 0;

    packTopWrap.style.animation = 'none';
    packTopWrap.style.transform = '';
    packTopWrap.classList.remove('fly');
    void packTopWrap.offsetWidth;
    packTopWrap.style.animation = '';

    cutLine.style.width = '0%';
    scissors.style.left = '-4px';

    prizeCard.style.cssText = 'position:fixed; opacity:0; z-index:1; pointer-events:none;';
    backdrop.classList.remove('show');
    repeatBtn.classList.remove('visible');
    hint.style.opacity = '1';

    pickPack();
  }

  tearZone.addEventListener('mousedown',  onStart);
  tearZone.addEventListener('touchstart', onStart, { passive: false });
  document.addEventListener('mousemove',  onMove);
  document.addEventListener('touchmove',  onMove,  { passive: false });
  document.addEventListener('mouseup',    onEnd);
  document.addEventListener('touchend',   onEnd);
  repeatBtn.addEventListener('click', reset);

  PACKS.forEach(p => [p.top, p.body].forEach(src => { new Image().src = src; }));
  pickPack();
</script>
</body>
</html>
